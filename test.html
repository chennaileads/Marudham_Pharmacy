<!DOCTYPE html>
<html>
<head>
    <title>Test Upload</title>
</head>
<body>
    <h2>Test Prescription Upload</h2>
    <form id="testForm" enctype="multipart/form-data">
        <input type="text" name="patient_name" placeholder="Patient Name" required><br><br>
        <input type="text" name="mobile" placeholder="Mobile" required><br><br>
        <input type="file" name="prescription" accept="image/*" required><br><br>
        <button type="submit">Test Upload</button>
    </form>
    <div id="status"></div>

    <script>
    document.getElementById("testForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        
        document.getElementById("status").innerHTML = "Uploading...";
        
        try {
            const response = await fetch("submit.php", {
                method: "POST",
                body: formData
            });
            
            const result = await response.json();
            
            if (result.success) {
                document.getElementById("status").innerHTML = 
                    "✅ Success! <a href='" + result.whatsapp_url + "' target='_blank'>Open WhatsApp</a>";
            } else {
                document.getElementById("status").innerHTML = "❌ Error: " + result.message;
            }
        } catch (error) {
            document.getElementById("status").innerHTML = "❌ Error: " + error.message;
        }
    });
    </script>
</body>
</html>
